<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>petBTI · 宠物人格测评系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#000; --surface:#0a0a0a; --surface-2:#111;
  --white:#fff; --silver:#a6a6a6;
  --blue:#0099ff; --blue-glow:rgba(0,153,255,0.15);
  --frosted:rgba(255,255,255,0.08); --frosted-h:rgba(255,255,255,0.13);
  --ring:0 0 0 1px rgba(0,153,255,0.2);
  --ring-a:0 0 0 1.5px #0099ff;
  --elev:rgba(255,255,255,0.06) 0px 0.5px 0px 0.5px,rgba(0,0,0,0.5) 0px 10px 30px;
}
html,body { height:100%; font-family:'Inter',-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--white); overflow-x:hidden; -webkit-font-smoothing:antialiased; }
.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; animation:sIn .5s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes sIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

/* WELCOME */
#screen-welcome { justify-content:space-between; padding:60px 24px 48px; position:relative; overflow:hidden; }
.w-glow { position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(0,153,255,.12) 0%,transparent 70%); top:-200px; left:50%; transform:translateX(-50%); pointer-events:none; }
.w-top { flex:1; display:flex; flex-direction:column; justify-content:center; }
.eyebrow { display:inline-flex; align-items:center; gap:6px; background:var(--frosted); box-shadow:var(--ring); border-radius:100px; padding:5px 14px; font-size:11px; font-weight:500; color:var(--silver); letter-spacing:.5px; margin-bottom:28px; align-self:flex-start; }
.eyebrow::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--blue); display:inline-block; }
.w-title { font-size:clamp(72px,22vw,96px); font-weight:700; line-height:.88; letter-spacing:-6px; margin-bottom:20px; }
.w-title em { font-style:normal; color:var(--blue); }
.w-desc { font-size:15px; color:var(--silver); line-height:1.6; max-width:280px; letter-spacing:-.1px; margin-bottom:40px; }
.inp-label { display:block; font-size:11px; font-weight:500; color:var(--silver); letter-spacing:.8px; text-transform:uppercase; margin-bottom:8px; }
.inp { width:100%; background:var(--frosted); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:14px 18px; font-size:16px; font-family:inherit; color:var(--white); outline:none; transition:border-color .2s,box-shadow .2s; -webkit-appearance:none; appearance:none; margin-bottom:12px; }
.inp::placeholder { color:rgba(255,255,255,.2); }
.inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow); }
.btn-p { width:100%; background:var(--white); color:#000; border:none; border-radius:100px; padding:16px; font-size:15px; font-weight:600; font-family:inherit; letter-spacing:-.3px; cursor:pointer; transition:opacity .2s,transform .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-p:active { transform:scale(.97); opacity:.9; }
.btn-p .arr { width:20px; height:20px; background:rgba(0,0,0,.08); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:11px; }
.w-meta { margin-top:16px; font-size:12px; color:rgba(255,255,255,.25); text-align:center; }

/* QUIZ */
.q-nav { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 0; }
.q-back { width:32px; height:32px; border-radius:50%; background:var(--frosted); box-shadow:var(--ring); border:none; color:var(--silver); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.q-back:active { background:var(--frosted-h); }
.q-ctr { font-size:12px; font-weight:500; color:var(--silver); }
.q-prog { padding:16px 24px 0; }
.p-track { height:2px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
.p-fill { height:100%; background:var(--blue); border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px var(--blue); }
.q-body { padding:32px 24px 40px; flex:1; display:flex; flex-direction:column; }
.q-tag { display:inline-flex; align-items:center; gap:6px; background:var(--frosted); box-shadow:var(--ring); border-radius:100px; padding:4px 12px; font-size:12px; font-weight:500; color:var(--silver); margin-bottom:24px; align-self:flex-start; }
.q-num { font-size:11px; font-weight:500; color:var(--blue); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.q-text { font-size:22px; font-weight:600; line-height:1.35; letter-spacing:-.6px; color:var(--white); margin-bottom:32px; }
.opts { display:flex; flex-direction:column; gap:10px; }
.opt { background:var(--surface); box-shadow:var(--ring); border:none; border-radius:14px; padding:16px 18px; font-size:14px; font-family:inherit; color:var(--silver); cursor:pointer; text-align:left; line-height:1.5; transition:box-shadow .2s,background .2s,color .2s; display:flex; align-items:flex-start; gap:14px; }
.opt:active { background:var(--surface-2); }
.opt-l { flex-shrink:0; width:24px; height:24px; border-radius:6px; background:rgba(255,255,255,.05); color:rgba(255,255,255,.25); font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; transition:all .2s; margin-top:1px; }
.opt-t { flex:1; }
.opt.sel { box-shadow:var(--ring-a),0 0 20px var(--blue-glow); background:rgba(0,153,255,.06); color:var(--white); animation:oP .3s ease; }
.opt.sel .opt-l { background:var(--blue); color:#fff; }
@keyframes oP { 0%{transform:scale(1)} 40%{transform:scale(1.02)} 100%{transform:scale(1)} }

/* LOADING */
#screen-loading { align-items:center; justify-content:center; position:relative; }
.l-ring { position:absolute; border-radius:50%; border:1px solid rgba(0,153,255,.15); animation:rP 2s ease-in-out infinite; }
.l-ring:nth-child(1){width:240px;height:240px}
.l-ring:nth-child(2){width:160px;height:160px;animation-delay:.4s;border-color:rgba(0,153,255,.25)}
.l-ring:nth-child(3){width:80px;height:80px;animation-delay:.8s;border-color:rgba(0,153,255,.5)}
@keyframes rP { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.08);opacity:1} }
.l-ctr { position:relative; z-index:1; text-align:center; }
.l-icon { font-size:32px; display:block; margin-bottom:20px; animation:iS 3s linear infinite; }
@keyframes iS { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.l-lbl { font-size:13px; font-weight:500; color:var(--silver); margin-bottom:24px; }
.l-bar { width:120px; height:2px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; margin:0 auto; }
.l-fill { height:100%; background:var(--blue); border-radius:2px; animation:lP 1.6s cubic-bezier(.4,0,.2,1) forwards; box-shadow:0 0 6px var(--blue); }
@keyframes lP { from{width:0%} to{width:100%} }

/* RESULT */
#screen-result { background:var(--bg); overflow-y:auto; }
.r-hero { padding:44px 24px 36px; position:relative; overflow:hidden; border-bottom:1px solid rgba(255,255,255,.06); }
.r-hero-glow { position:absolute; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle,rgba(0,153,255,.14) 0%,transparent 65%); top:-80px; right:-80px; pointer-events:none; }

/* Avatar */
.r-avatar { width:180px; height:180px; border-radius:20px; overflow:hidden; margin:0 auto 24px; box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 32px rgba(0,153,255,.12); display:flex; align-items:center; justify-content:center; }
.r-avatar svg { width:100%; height:100%; }

.r-eyebrow { display:inline-flex; align-items:center; gap:6px; background:var(--frosted); box-shadow:var(--ring); border-radius:100px; padding:5px 14px; font-size:11px; font-weight:500; color:var(--silver); letter-spacing:.5px; margin-bottom:16px; }
.r-for { font-size:13px; font-weight:500; color:var(--silver); margin-bottom:10px; }
.r-type { font-size:clamp(22px,6vw,28px); font-weight:600; line-height:1; letter-spacing:2px; color:rgba(255,255,255,.45); margin-bottom:10px; text-transform:uppercase; }
.r-type .hi { color:rgba(0,153,255,.7); }
.r-nick { font-size:clamp(30px,9vw,42px); font-weight:700; line-height:.95; letter-spacing:-1.5px; color:var(--white); margin-bottom:22px; }
.r-nick::before { display:none; }

/* Confidence */
.conf-row { display:flex; align-items:center; gap:12px; background:var(--frosted); border-radius:12px; padding:12px 16px; box-shadow:var(--ring); }
.conf-main { flex:1; }
.conf-lbl { font-size:11px; font-weight:500; color:var(--silver); letter-spacing:.5px; margin-bottom:6px; }
.conf-track { height:3px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
.conf-fill { height:100%; background:var(--blue); border-radius:3px; box-shadow:0 0 6px var(--blue); transition:width 1.2s cubic-bezier(.4,0,.2,1); }
.conf-pct { font-size:22px; font-weight:700; color:var(--white); letter-spacing:-1px; line-height:1; flex-shrink:0; }
.conf-pct span { font-size:12px; font-weight:400; color:var(--silver); }
.conf-hit { font-size:11px; color:var(--silver); margin-top:4px; }
.conf-hit em { font-style:normal; color:var(--blue); font-weight:600; }

/* Result cards */
.r-body { padding:20px 20px 48px; display:flex; flex-direction:column; gap:12px; }
.rc { background:var(--surface); box-shadow:var(--ring),var(--elev); border-radius:16px; overflow:hidden; }
.rc-head { padding:13px 18px; border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:center; gap:8px; }
.rc-head .dot { width:6px; height:6px; border-radius:50%; background:var(--blue); }
.rc-head .lbl { font-size:11px; font-weight:600; color:rgba(255,255,255,.3); letter-spacing:1px; text-transform:uppercase; }

.roast-txt { padding:18px; font-size:15px; font-weight:400; line-height:1.8; color:var(--silver); letter-spacing:-.1px; }

/* Traits */
.traits-g { padding:16px 18px; display:grid; grid-template-columns:1fr 1fr; gap:14px 20px; }
.tr-item { display:flex; flex-direction:column; gap:6px; }
.tr-name { font-size:11px; font-weight:500; color:rgba(255,255,255,.4); }
.tr-dots { display:flex; gap:4px; }
.dp { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.08); transition:background .8s,box-shadow .8s; }
.dp.on { background:var(--blue); box-shadow:0 0 5px rgba(0,153,255,.6); }
.tr-val { font-size:10px; font-weight:600; letter-spacing:.5px; margin-top:-2px; }
.tr-val.H { color:var(--blue); }
.tr-val.M { color:rgba(255,255,255,.4); }
.tr-val.L { color:rgba(255,255,255,.2); }

/* Tips */
.tips-l { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.tip { display:flex; gap:12px; align-items:flex-start; }
.tip-n { flex-shrink:0; width:20px; height:20px; border-radius:50%; background:var(--blue-glow); box-shadow:0 0 0 1px rgba(0,153,255,.3); color:var(--blue); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px; }
.tip-t { font-size:14px; line-height:1.6; color:var(--silver); flex:1; }

/* Dims */
.dims-g { padding:16px 18px; display:flex; flex-direction:column; gap:12px; }
.dim-row { display:grid; grid-template-columns:18px 1fr 18px; align-items:center; gap:10px; }
.dim-l,.dim-r { font-size:11px; font-weight:600; color:rgba(255,255,255,.2); text-align:center; }
.dim-l.hi,.dim-r.hi { color:var(--white); }
.dim-track { height:3px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
.dim-fill { height:100%; border-radius:3px; background:var(--blue); box-shadow:0 0 6px var(--blue); transition:width 1.2s cubic-bezier(.4,0,.2,1); }

/* Compat */
.compat-txt { padding:18px; font-size:14px; line-height:1.75; color:var(--silver); }
.compat-tag { display:inline-block; background:var(--blue-glow); box-shadow:0 0 0 1px rgba(0,153,255,.25); color:var(--blue); font-size:11px; font-weight:600; padding:3px 10px; border-radius:100px; margin-bottom:10px; }

/* Buttons */
.btn-w { width:100%; background:var(--white); color:#000; border:none; border-radius:100px; padding:16px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; transition:opacity .2s,transform .15s; }
.btn-w:active { transform:scale(.97); opacity:.9; }
.btn-g { width:100%; background:var(--frosted); color:var(--silver); border:none; box-shadow:var(--ring); border-radius:100px; padding:14px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; transition:background .2s,transform .15s; }
.btn-g:active { transform:scale(.97); background:var(--frosted-h); }

/* Toast */
.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--surface-2); box-shadow:var(--ring),var(--elev); color:var(--white); padding:10px 20px; border-radius:100px; font-size:13px; font-weight:500; opacity:0; transition:all .3s cubic-bezier(.16,1,.3,1); pointer-events:none; white-space:nowrap; z-index:9999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="screen-welcome" class="screen active">
  <div class="w-glow"></div>
  <div class="w-top" style="position:relative;z-index:1">
    <div class="eyebrow">v1.0 · The Lexicon</div>
    <div class="w-title">pet<em>BTI</em></div>
    <div class="w-desc">12 道行为题，破解你家主子的真实人格类型。</div>
  </div>
  <div style="position:relative;z-index:1">
    <label class="inp-label">主子的名字</label>
    <input class="inp" type="text" id="pet-name-input" placeholder="橘猫、二狗子…" maxlength="10" onkeydown="if(event.key==='Enter')startQuiz()">
    <button class="btn-p" onclick="startQuiz()">开始测评 <span class="arr">→</span></button>
    <div class="w-meta">共 12 题 · 约 2 分钟</div>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="q-nav">
    <button class="q-back" onclick="goBack()">←</button>
    <div class="q-ctr" id="q-ctr">1 / 12</div>
  </div>
  <div class="q-prog"><div class="p-track"><div class="p-fill" id="p-fill" style="width:8.33%"></div></div></div>
  <div class="q-body">
    <div class="q-tag">🐾 <span id="q-pet">主子</span></div>
    <div class="q-num" id="q-num">Q01</div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen">
  <div class="l-ring"></div><div class="l-ring"></div><div class="l-ring"></div>
  <div class="l-ctr">
    <span class="l-icon">🐾</span>
    <div class="l-lbl">正在解析人格矩阵…</div>
    <div class="l-bar"><div class="l-fill"></div></div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="r-hero">
    <div class="r-hero-glow"></div>
    <div class="r-eyebrow eyebrow">petBTI TYPE RESULT</div>
    <div class="r-avatar" id="r-avatar"></div>
    <div class="r-for" id="r-for">你家主子</div>
    <div class="r-nick" id="r-nick">吗喽 MONKEY-er</div>
    <div class="r-type" id="r-type">ENFP</div>
    <div class="conf-row">
      <div class="conf-main">
        <div class="conf-lbl">置信度</div>
        <div class="conf-track"><div class="conf-fill" id="c-fill" style="width:0%"></div></div>
        <div class="conf-hit" id="c-hit">精准命中 <em>—</em> / 12 题</div>
      </div>
      <div class="conf-pct" id="c-pct">—<span>%</span></div>
    </div>
  </div>

  <div class="r-body">
    <div class="rc">
      <div class="rc-head"><div class="dot"></div><div class="lbl">毒舌解析 · THE ROAST</div></div>
      <div class="roast-txt" id="r-roast"></div>
    </div>
    <div class="rc">
      <div class="rc-head"><div class="dot"></div><div class="lbl">主子特征图鉴</div></div>
      <div class="traits-g" id="r-traits"></div>
    </div>
    <div class="rc">
      <div class="rc-head"><div class="dot"></div><div class="lbl">铲屎官生存指南</div></div>
      <div class="tips-l" id="r-tips"></div>
    </div>
    <div class="rc">
      <div class="rc-head"><div class="dot"></div><div class="lbl">人格维度</div></div>
      <div class="dims-g">
        <div class="dim-row" id="d-ei"><div class="dim-l">E</div><div class="dim-track"><div class="dim-fill" id="b-ei" style="width:0%"></div></div><div class="dim-r">I</div></div>
        <div class="dim-row" id="d-sn"><div class="dim-l">S</div><div class="dim-track"><div class="dim-fill" id="b-sn" style="width:0%"></div></div><div class="dim-r">N</div></div>
        <div class="dim-row" id="d-tf"><div class="dim-l">T</div><div class="dim-track"><div class="dim-fill" id="b-tf" style="width:0%"></div></div><div class="dim-r">F</div></div>
        <div class="dim-row" id="d-jp"><div class="dim-l">J</div><div class="dim-track"><div class="dim-fill" id="b-jp" style="width:0%"></div></div><div class="dim-r">P</div></div>
      </div>
    </div>
    <div class="rc">
      <div class="rc-head"><div class="dot"></div><div class="lbl">与主子的相处公式</div></div>
      <div class="compat-txt"><div class="compat-tag" id="r-ctag"></div><div id="r-compat"></div></div>
    </div>
    <button class="btn-w" onclick="shareResult()">分享给铲屎官朋友</button>
    <button class="btn-g" onclick="restartQuiz()">重新测一次</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// FULL-BODY SCENE RENDERER
// ============================================================
function makeScene(c) {
  const { bg='#050505', fur='#C8A882', fd='#907060', gc='#0099ff',
          ear='cat', eye='dot', scene='stand', extras=[] } = c;
  const p = [];

  // Helper: draw head (portrait-style, reused from makeSVG but smaller)
  function head(cx, cy, sc, eyeStyle, mouthStyle, browStyle) {
    const hrx = 28*sc, hry = 24*sc;
    const eyLx=cx-10*sc, eyRx=cx+10*sc, eyY=cy-4*sc;
    const nY=cy+6*sc, mY=nY+5*sc;
    const bY=eyY-7*sc;
    const h=[];

    // ears
    if (ear==='cat') {
      const lx=cx-hrx+5*sc, rx=cx+hrx-5*sc, ty=cy-hry+4*sc;
      h.push(`<polygon points="${lx},${ty+7*sc} ${lx-7*sc},${ty-12*sc} ${lx+14*sc},${ty+1*sc}" fill="${fur}"/>`);
      h.push(`<polygon points="${rx},${ty+7*sc} ${rx+7*sc},${ty-12*sc} ${rx-14*sc},${ty+1*sc}" fill="${fur}"/>`);
      h.push(`<polygon points="${lx+1},${ty+5*sc} ${lx-4*sc},${ty-5*sc} ${lx+10*sc},${ty}" fill="${fd}" opacity=".4"/>`);
      h.push(`<polygon points="${rx-1},${ty+5*sc} ${rx+4*sc},${ty-5*sc} ${rx-10*sc},${ty}" fill="${fd}" opacity=".4"/>`);
    } else {
      h.push(`<ellipse cx="${cx-hrx+1*sc}" cy="${cy-hry+10*sc}" rx="${9*sc}" ry="${15*sc}" fill="${fur}" transform="rotate(-18,${cx-hrx+1*sc},${cy-hry+10*sc})"/>`);
      h.push(`<ellipse cx="${cx+hrx-1*sc}" cy="${cy-hry+10*sc}" rx="${9*sc}" ry="${15*sc}" fill="${fur}" transform="rotate(18,${cx+hrx-1*sc},${cy-hry+10*sc})"/>`);
    }
    // head
    h.push(`<ellipse cx="${cx}" cy="${cy}" rx="${hrx}" ry="${hry}" fill="${fur}"/>`);
    // blush
    h.push(`<ellipse cx="${cx-hrx+9*sc}" cy="${cy+6*sc}" rx="${6*sc}" ry="${3*sc}" fill="rgba(220,120,90,.22)"/>`);
    h.push(`<ellipse cx="${cx+hrx-9*sc}" cy="${cy+6*sc}" rx="${6*sc}" ry="${3*sc}" fill="rgba(220,120,90,.22)"/>`);
    // eyes
    function ey(ex,ey2,s){
      const r=5*sc,r2=3*sc,r3=1.5*sc;
      switch(s){
        case 'dot':    return `<circle cx="${ex}" cy="${ey2}" r="${r}" fill="#fff"/><circle cx="${ex}" cy="${ey2+0.5*sc}" r="${r2}" fill="#1a0800"/><circle cx="${ex+1.2*sc}" cy="${ey2-1.2*sc}" r="${r3}" fill="#fff"/>`;
        case 'wide':   return `<circle cx="${ex}" cy="${ey2}" r="${6*sc}" fill="#fff"/><circle cx="${ex}" cy="${ey2+0.5*sc}" r="${4*sc}" fill="#1a0800"/><circle cx="${ex+1.5*sc}" cy="${ey2-1.5*sc}" r="${1.5*sc}" fill="#fff"/>`;
        case 'heart':  return `<text x="${ex}" y="${ey2+3*sc}" text-anchor="middle" font-size="${10*sc}" fill="#FF4466">♥</text>`;

      p.push(head(100, 122, 0.88, 'wide', 'sad', 'sad'));
      // tears
      p.push(`<path d="M83,130 Q81,140 79,147" fill="none" stroke="#88CCFF" stroke-width="2" stroke-linecap="round"/><ellipse cx="79" cy="149" rx="3" ry="4.5" fill="#88CCFF" opacity=".65"/>`);
      break;
    }

    case 'stare': { // INTP — sitting, staring blankly into void
      // wall panels
      p.push(`<rect x="0" y="0" width="40" height="220" fill="rgba(25,18,12,.75)"/><rect x="160" y="0" width="40" height="220" fill="rgba(25,18,12,.75)"/><line x1="40" y1="0" x2="40" y2="220" stroke="rgba(90,65,40,.5)" stroke-width="1.5"/><line x1="160" y1="0" x2="160" y2="220" stroke="rgba(90,65,40,.5)" stroke-width="1.5"/>`);
      body_sit(100, 142);
      p.push(head(100, 94, 1, 'hollow', 'flat', 'none'));
      // zzz
      p.push(`<text x="130" y="74" font-size="10" fill="${gc}" opacity=".65" font-weight="bold">z</text><text x="144" y="60" font-size="14" fill="${gc}" opacity=".45" font-weight="bold">z</text>`);
      break;
    }

    default: { // fallback sit
      body_sit(100, 140);
      p.push(head(100, 92, 1, eye, 'smile', 'none'));
    }
  }

  return `<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">${p.join('')}</svg>`;
}

// ============================================================
// SVG AVATAR GENERATOR
// ============================================================
function makeSVG(c) {
  // If scene mode, delegate to scene renderer
  if (c.scene) return makeScene(c);

  const {
    bg='#050505', fur='#C8A882', fd='#907060',
    ear='cat', eye='dot', eyeR=null,
    brow='flat', mouth='smile',
    acc='none', extras=[], gc='#0099ff',
    pose='normal'
  } = c;

  // Head geometry based on pose
  let hx=100, hy=128, hrx=58, hry=52;
  if (pose==='melted') { hrx=72; hry=36; hy=150; }
  if (pose==='small')  { hrx=40; hry=36; hy=148; hx=100; }

  const eyLx=hx-22, eyRx=hx+22, eyY=hy-10;
  const nY=hy+12, mY=nY+10;
  const p=[];

  // BG
  p.push(`<rect width="200" height="220" fill="${bg}"/>`);

  // Background extras
  if (extras.includes('spotlight')) p.push(`<polygon points="100,0 30,220 170,220" fill="rgba(255,220,80,.05)"/>`);
  if (extras.includes('bars'))      p.push(`<rect x="12" y="18" width="176" height="148" rx="8" fill="none" stroke="rgba(120,90,60,.35)" stroke-width="3"/><line x1="68" y1="18" x2="68" y2="166" stroke="rgba(120,90,60,.35)" stroke-width="3"/><line x1="132" y1="18" x2="132" y2="166" stroke="rgba(120,90,60,.35)" stroke-width="3"/>`);

  // Aura
  if (extras.includes('aura')) p.push(`<ellipse cx="${hx}" cy="${hy}" rx="72" ry="68" fill="${gc}" opacity=".06"/><ellipse cx="${hx}" cy="${hy}" rx="55" ry="52" fill="${gc}" opacity=".06"/>`);

  // EARS
  if (ear==='cat') {
    const lx=hx-hrx+10, rx=hx+hrx-10, ty=hy-hry+8;
    p.push(`<polygon points="${lx},${ty+14} ${lx-14},${ty-26} ${lx+30},${ty+2}" fill="${fur}"/>`);
    p.push(`<polygon points="${rx},${ty+14} ${rx+14},${ty-26} ${rx-30},${ty+2}" fill="${fur}"/>`);
    p.push(`<polygon points="${lx+1},${ty+10} ${lx-8},${ty-14} ${lx+22},${ty+1}" fill="${fd}" opacity=".4"/>`);
    p.push(`<polygon points="${rx-1},${ty+10} ${rx+8},${ty-14} ${rx-22},${ty+1}" fill="${fd}" opacity=".4"/>`);
  } else {
    const ey2=hy-hry+18;
    p.push(`<ellipse cx="${hx-hrx+2}" cy="${ey2+22}" rx="18" ry="30" fill="${fur}" transform="rotate(-18,${hx-hrx+2},${ey2+22})"/>`);
    p.push(`<ellipse cx="${hx+hrx-2}" cy="${ey2+22}" rx="18" ry="30" fill="${fur}" transform="rotate(18,${hx+hrx-2},${ey2+22})"/>`);
  }

  // HEAD
  p.push(`<ellipse cx="${hx}" cy="${hy}" rx="${hrx}" ry="${hry}" fill="${fur}"/>`);

  // Blush
  if (!extras.includes('aura') && pose!=='small') {
    p.push(`<ellipse cx="${hx-hrx+20}" cy="${hy+12}" rx="13" ry="7" fill="rgba(220,120,90,.22)"/>`);
    p.push(`<ellipse cx="${hx+hrx-20}" cy="${hy+12}" rx="13" ry="7" fill="rgba(220,120,90,.22)"/>`);
  }

  // EYES
  function eye_(ex, ey, s) {
    switch(s) {
      case 'dot':    return `<circle cx="${ex}" cy="${ey}" r="9" fill="#fff"/><circle cx="${ex}" cy="${ey+1}" r="5.5" fill="#1a0800"/><circle cx="${ex+2}" cy="${ey-2}" r="2" fill="#fff"/>`;
      case 'wide':   return `<circle cx="${ex}" cy="${ey}" r="11" fill="#fff"/><circle cx="${ex}" cy="${ey+1}" r="7" fill="#1a0800"/><circle cx="${ex+3}" cy="${ey-3}" r="2.5" fill="#fff"/>`;
      case 'heart':  return `<text x="${ex}" y="${ey+6}" text-anchor="middle" font-size="17" fill="#FF4466">♥</text>`;
      case 'star':   return `<text x="${ex}" y="${ey+6}" text-anchor="middle" font-size="17" fill="#FFD700">★</text>`;
      case 'x':      return `<line x1="${ex-7}" y1="${ey-7}" x2="${ex+7}" y2="${ey+7}" stroke="#666" stroke-width="3" stroke-linecap="round"/><line x1="${ex+7}" y1="${ey-7}" x2="${ex-7}" y2="${ey+7}" stroke="#666" stroke-width="3" stroke-linecap="round"/>`;
      case 'half':   return `<path d="M${ex-9} ${ey} A 9 9 0 0 1 ${ex+9} ${ey}" fill="#fff"/><path d="M${ex-6} ${ey} A 6 6 0 0 1 ${ex+6} ${ey}" fill="#1a0800"/>`;
      case 'hollow': return `<circle cx="${ex}" cy="${ey}" r="9" fill="none" stroke="rgba(180,180,180,.5)" stroke-width="2.5"/>`;
      case 'glow':   return `<circle cx="${ex}" cy="${ey}" r="11" fill="${gc}" opacity=".18"/><circle cx="${ex}" cy="${ey}" r="6.5" fill="${gc}" opacity=".8"/><circle cx="${ex+2}" cy="${ey-2}" r="2" fill="#fff" opacity=".9"/>`;
      case 'sparkle':return `<circle cx="${ex}" cy="${ey}" r="9" fill="#fff"/><circle cx="${ex}" cy="${ey+1}" r="5.5" fill="${gc}"/><circle cx="${ex+2}" cy="${ey-2}" r="2" fill="#fff"/><line x1="${ex-14}" y1="${ey}" x2="${ex+14}" y2="${ey}" stroke="${gc}" stroke-width="1.2" opacity=".35"/><line x1="${ex}" y1="${ey-14}" x2="${ex}" y2="${ey+14}" stroke="${gc}" stroke-width="1.2" opacity=".35"/>`;
      case 'smug':   return `<path d="M${ex-9} ${ey+4} A 9 8 0 0 1 ${ex+9} ${ey+4}" fill="#fff"/><path d="M${ex-6} ${ey+5} A 6 5 0 0 1 ${ex+6} ${ey+5}" fill="#1a0800"/><line x1="${ex-9}" y1="${ey+4}" x2="${ex+9}" y2="${ey+4}" stroke="${fur}" stroke-width="2"/>`;
      case 'spiral': return `<path d="M${ex},${ey} m-5,0 a5,5,0,1,1,10,0 a3,3,0,1,1,-6,0 a1.5,1.5,0,1,1,3,0" fill="none" stroke="#888" stroke-width="1.5"/>`;
      default:       return `<circle cx="${ex}" cy="${ey}" r="9" fill="#fff"/><circle cx="${ex}" cy="${ey+1}" r="5.5" fill="#1a0800"/>`;
    }
  }
  p.push(eye_(eyLx, eyY, eye));
  p.push(eye_(eyRx, eyY, eyeR||eye));

  // BROWS
  const bY=eyY-14;
  if (brow==='angry')     p.push(`<line x1="${eyLx-10}" y1="${bY+4}" x2="${eyLx+10}" y2="${bY}" stroke="${fd}" stroke-width="3" stroke-linecap="round"/><line x1="${eyRx-10}" y1="${bY}" x2="${eyRx+10}" y2="${bY+4}" stroke="${fd}" stroke-width="3" stroke-linecap="round"/>`);
  if (brow==='worried')   p.push(`<line x1="${eyLx-10}" y1="${bY}" x2="${eyLx+10}" y2="${bY+4}" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/><line x1="${eyRx-10}" y1="${bY+4}" x2="${eyRx+10}" y2="${bY}" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (brow==='surprised') p.push(`<path d="M${eyLx-9},${bY-4} Q${eyLx},${bY-10} ${eyLx+9},${bY-4}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/><path d="M${eyRx-9},${bY-4} Q${eyRx},${bY-10} ${eyRx+9},${bY-4}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (brow==='raised-one') p.push(`<line x1="${eyLx-9}" y1="${bY+1}" x2="${eyLx+9}" y2="${bY+1}" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/><path d="M${eyRx-9},${bY-5} Q${eyRx},${bY-10} ${eyRx+9},${bY-5}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (brow==='sad')        p.push(`<path d="M${eyLx-9},${bY+3} Q${eyLx},${bY-4} ${eyLx+9},${bY+3}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/><path d="M${eyRx-9},${bY+3} Q${eyRx},${bY-4} ${eyRx+9},${bY+3}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);

  // NOSE
  p.push(`<ellipse cx="${hx}" cy="${nY}" rx="5" ry="3.5" fill="${fd}"/>`);

  // MOUTH
  if (mouth==='smile')  p.push(`<path d="M${hx-12} ${mY} Q${hx} ${mY+10} ${hx+12} ${mY}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (mouth==='flat')   p.push(`<line x1="${hx-10}" y1="${mY}" x2="${hx+10}" y2="${mY}" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (mouth==='smirk')  p.push(`<path d="M${hx-6} ${mY+2} Q${hx+5} ${mY+7} ${hx+12} ${mY-2}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (mouth==='open')   p.push(`<path d="M${hx-12} ${mY} Q${hx} ${mY+14} ${hx+12} ${mY}" fill="#5a2020"/><path d="M${hx-9} ${mY} Q${hx} ${mY+10} ${hx+9} ${mY}" fill="#7a3030"/>`);
  if (mouth==='grr')    p.push(`<path d="M${hx-14} ${mY} L${hx-14} ${mY+8} L${hx-6} ${mY+3} L${hx} ${mY+9} L${hx+6} ${mY+3} L${hx+14} ${mY+8} L${hx+14} ${mY}" fill="#5a2020"/>`);
  if (mouth==='sad')    p.push(`<path d="M${hx-12} ${mY+7} Q${hx} ${mY} ${hx+12} ${mY+7}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (mouth==='pout')   p.push(`<path d="M${hx-8} ${mY+5} Q${hx} ${mY} ${hx+8} ${mY+5}" fill="none" stroke="${fd}" stroke-width="2.5" stroke-linecap="round"/>`);
  if (mouth==='tongue') p.push(`<path d="M${hx-10} ${mY} Q${hx} ${mY+7} ${hx+10} ${mY}" fill="none" stroke="${fd}" stroke-width="2" stroke-linecap="round"/><ellipse cx="${hx}" cy="${mY+14}" rx="8" ry="10" fill="#FF8099"/><line x1="${hx}" y1="${mY+9}" x2="${hx}" y2="${mY+22}" stroke="#FF6080" stroke-width="1.5" opacity=".6"/>`);

  // WHISKERS
  if (pose!=='melted') {
    const wy=nY+2;
    p.push(`<line x1="${hx-hrx+6}" y1="${wy-3}" x2="${hx-22}" y2="${wy}" stroke="rgba(200,180,150,.35)" stroke-width="1"/><line x1="${hx-hrx+6}" y1="${wy+4}" x2="${hx-22}" y2="${wy+4}" stroke="rgba(200,180,150,.35)" stroke-width="1"/><line x1="${hx+hrx-6}" y1="${wy-3}" x2="${hx+22}" y2="${wy}" stroke="rgba(200,180,150,.35)" stroke-width="1"/><line x1="${hx+hrx-6}" y1="${wy+4}" x2="${hx+22}" y2="${wy+4}" stroke="rgba(200,180,150,.35)" stroke-width="1"/>`);
  }

  // ACCESSORIES
  const aY=hy-hry-4;
  if (acc==='crown') p.push(`<polygon points="${hx-22},${aY+6} ${hx-22},${aY-16} ${hx-10},${aY-6} ${hx},${aY-18} ${hx+10},${aY-6} ${hx+22},${aY-16} ${hx+22},${aY+6}" fill="#FFD700"/><circle cx="${hx-8}" cy="${aY-1}" r="3" fill="#FF4444" opacity=".85"/><circle cx="${hx}" cy="${aY-4}" r="3" fill="#44FFAA" opacity=".85"/><circle cx="${hx+8}" cy="${aY-1}" r="3" fill="#4488FF" opacity=".85"/>`);
  if (acc==='hardhat') p.push(`<ellipse cx="${hx}" cy="${aY+4}" rx="44" ry="11" fill="#FF8800"/><path d="M${hx-36},${aY+4} Q${hx},${aY-28} ${hx+36},${aY+4}" fill="#FF8800"/><rect x="${hx-22}" y="${aY-2}" width="44" height="9" rx="2" fill="#CC6600"/>`);
  if (acc==='badge') p.push(`<rect x="${hx-16}" y="${aY+8}" width="32" height="22" rx="3" fill="#1a3a6a"/><rect x="${hx-13}" y="${aY+10}" width="26" height="16" rx="2" fill="#2a5aaa"/><text x="${hx}" y="${aY+22}" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">保安</text>`);
  if (acc==='goggles') p.push(`<rect x="${hx-32}" y="${eyY-10}" width="22" height="18" rx="5" fill="#222" stroke="#555" stroke-width="1.5"/><rect x="${hx+10}" y="${eyY-10}" width="22" height="18" rx="5" fill="#222" stroke="#555" stroke-width="1.5"/><rect x="${hx-10}" y="${eyY-2}" width="20" height="4" rx="2" fill="#444"/><ellipse cx="${hx-21}" cy="${eyY-1}" rx="8" ry="6" fill="#4488FF" opacity=".45"/><ellipse cx="${hx+21}" cy="${eyY-1}" rx="8" ry="6" fill="#4488FF" opacity=".45"/>`);

  // EXTRAS ON TOP
  if (extras.includes('tie')) {
    const tb=hy+hry-3;
    p.push(`<polygon points="${hx-5},${tb} ${hx+5},${tb} ${hx+8},${tb+18} ${hx},${tb+28} ${hx-8},${tb+18}" fill="${gc}"/><rect x="${hx-6}" y="${tb}" width="12" height="5" rx="1" fill="${gc}" opacity=".8"/>`);
  }
  if (extras.includes('hearts')) p.push(`<text x="25" y="70" font-size="18" fill="#FF4466" opacity=".75">♥</text><text x="163" y="78" font-size="14" fill="#FF4466" opacity=".6">♥</text><text x="38" y="185" font-size="12" fill="#FF4466" opacity=".5">♥</text><text x="155" y="178" font-size="20" fill="#FF4466" opacity=".65">♥</text>`);
  if (extras.includes('sparkles')) p.push(`<text x="20" y="82" font-size="13" fill="#FFD700" opacity=".8">✦</text><text x="168" y="72" font-size="10" fill="#FFD700" opacity=".6">✦</text><text x="28" y="174" font-size="10" fill="#FFD700" opacity=".5">✦</text><text x="162" y="168" font-size="14" fill="#FFD700" opacity=".65">✦</text>`);
  if (extras.includes('chaos')) p.push(`<line x1="18" y1="38" x2="48" y2="62" stroke="rgba(255,100,40,.25)" stroke-width="2"/><line x1="182" y1="38" x2="152" y2="62" stroke="rgba(255,100,40,.25)" stroke-width="2"/><line x1="18" y1="185" x2="48" y2="162" stroke="rgba(255,100,40,.25)" stroke-width="2"/><line x1="182" y1="185" x2="152" y2="162" stroke="rgba(255,100,40,.25)" stroke-width="2"/><text x="22" y="52" font-size="15" opacity=".45">💥</text><text x="156" y="52" font-size="12" opacity=".35">⚡</text>`);
  if (extras.includes('tears')) { const tx2=eyLx; p.push(`<path d="M${tx2},${eyY+9} Q${tx2-2},${eyY+22} ${tx2-4},${eyY+30}" fill="none" stroke="#88CCFF" stroke-width="2.5" stroke-linecap="round"/><ellipse cx="${tx2-4}" cy="${eyY+32}" rx="4" ry="6" fill="#88CCFF" opacity=".65"/>`); }
  if (extras.includes('sweat')) p.push(`<path d="M${hx+hrx-4},${hy-22} Q${hx+hrx+8},${hy-10} ${hx+hrx+2},${hy}" fill="none" stroke="#88CCFF" stroke-width="2" stroke-linecap="round"/><ellipse cx="${hx+hrx+2}" cy="${hy+2}" rx="4" ry="6" fill="#88CCFF" opacity=".55"/>`);
  if (extras.includes('zzz')) p.push(`<text x="${hx+hrx-8}" y="${hy-hry+8}" font-size="11" fill="${gc}" opacity=".65" font-weight="bold">z</text><text x="${hx+hrx+4}" y="${hy-hry-6}" font-size="15" fill="${gc}" opacity=".45" font-weight="bold">z</text><text x="${hx+hrx+14}" y="${hy-hry-20}" font-size="19" fill="${gc}" opacity=".3" font-weight="bold">z</text>`);
  if (extras.includes('puddle')) p.push(`<ellipse cx="${hx}" cy="200" rx="68" ry="14" fill="${fur}" opacity=".35"/>`);
  if (extras.includes('walls')) p.push(`<rect x="0" y="0" width="42" height="220" fill="rgba(25,18,12,.75)"/><rect x="158" y="0" width="42" height="220" fill="rgba(25,18,12,.75)"/><line x1="42" y1="0" x2="42" y2="220" stroke="rgba(90,65,40,.5)" stroke-width="2"/><line x1="158" y1="0" x2="158" y2="220" stroke="rgba(90,65,40,.5)" stroke-width="2"/>`);

  return `<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">${p.join('')}</svg>`;
}

// ============================================================
// STATE & QUIZ LOGIC
// ============================================================
let petName='', currentQ=0, answers={EI:[],SN:[],TF:[],JP:[]};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function startQuiz(){
  petName=document.getElementById('pet-name-input').value.trim()||'主子';
  answers={EI:[],SN:[],TF:[],JP:[]};
  currentQ=0;
  document.getElementById('q-pet').textContent=petName;
  showScreen('quiz'); renderQ();
}
function goBack(){
  if(currentQ>0){ const q=QS[currentQ-1]; answers[q.dim].pop(); currentQ--; renderQ(); }
  else showScreen('welcome');
}
function renderQ(){
  const q=QS[currentQ];
  const pct=((currentQ+1)/QS.length*100).toFixed(1);
  document.getElementById('p-fill').style.width=pct+'%';
  document.getElementById('q-ctr').textContent=(currentQ+1)+' / '+QS.length;
  document.getElementById('q-num').textContent=q.num;
  document.getElementById('q-text').textContent=q.text;
  const list=document.getElementById('opts'); list.innerHTML='';
  q.options.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<div class="opt-l">${o.l}</div><div class="opt-t">${o.t}</div>`;
    btn.onclick=()=>pick(o.s,btn,q.dim);
    list.appendChild(btn);
  });
}
function pick(score,btn,dim){
  if(document.querySelector('.opt.sel')) return;
  btn.classList.add('sel');
  answers[dim].push(score);
  setTimeout(()=>{ currentQ++; if(currentQ>=QS.length){ showScreen('loading'); setTimeout(showResult,1900); } else renderQ(); },380);
}

// ============================================================
// SCORING & RESULT
// ============================================================
function calc(){
  const r=(arr,v)=>arr.length?arr.filter(x=>x===v).length/arr.length:0.5;
  const ei=r(answers.EI,'E'), sn=r(answers.SN,'S'), tf=r(answers.TF,'T'), jp=r(answers.JP,'J');
  const e1=ei>=.5?'E':'I', e2=sn>=.5?'S':'N', e3=tf>=.5?'T':'F', e4=jp>=.5?'J':'P';
  const type=e1+e2+e3+e4;
  const hit=[answers.EI.filter(x=>x===e1).length, answers.SN.filter(x=>x===e2).length, answers.TF.filter(x=>x===e3).length, answers.JP.filter(x=>x===e4).length].reduce((a,b)=>a+b,0);
  return {type,ei,sn,tf,jp,e1,e2,e3,e4,hit,conf:Math.round(hit/12*100)};
}

function showResult(){
  const r=calc();
  const data=TYPES[r.type]||TYPES['INTP'];
  const avcfg=AVATARS[r.type]||AVATARS['INTP'];

  // Avatar
  document.getElementById('r-avatar').innerHTML=makeSVG(avcfg);

  // Hero
  document.getElementById('r-for').textContent=petName+' 的人格类型是';
  document.getElementById('r-type').innerHTML=`<span class="hi">${r.type[0]}</span>${r.type.slice(1)}`;
  document.getElementById('r-nick').textContent=data.nickname;

  // Roast
  document.getElementById('r-roast').textContent=data.roast;

  // Compat
  document.getElementById('r-ctag').textContent=data.compatTag;
  document.getElementById('r-compat').textContent=data.compat;

  // Tips
  document.getElementById('r-tips').innerHTML=data.tips.map((t,i)=>
    `<div class="tip"><div class="tip-n">${i+1}</div><div class="tip-t">${t}</div></div>`).join('');

  showScreen('result');

  setTimeout(()=>{
    // Confidence
    document.getElementById('c-fill').style.width=r.conf+'%';
    document.getElementById('c-pct').innerHTML=r.conf+'<span>%</span>';
    document.getElementById('c-hit').innerHTML=`精准命中 <em>${r.hit}</em> / 12 题`;

    // Dim bars
    document.getElementById('b-ei').style.width=(r.ei*100)+'%';
    document.getElementById('b-sn').style.width=(r.sn*100)+'%';
    document.getElementById('b-tf').style.width=(r.tf*100)+'%';
    document.getElementById('b-jp').style.width=(r.jp*100)+'%';
    ['ei','sn','tf','jp'].forEach(d=>{
      const scores={ei:r.ei,sn:r.sn,tf:r.tf,jp:r.jp};
      const row=document.getElementById('d-'+d);
      if(row) row.querySelector(scores[d]>=.5?'.dim-l':'.dim-r').classList.add('hi');
    });

    // Traits
    const tg=document.getElementById('r-traits'); tg.innerHTML='';
    TRAIT_DEFS.forEach(def=>{
      const v=data.traits[def.key];
      const lv=v>=4?'H':v>=3?'M':'L';
      let dots='';
      for(let i=1;i<=5;i++) dots+=`<div class="dp${i<=v?' on':''}"></div>`;
      tg.innerHTML+=`<div class="tr-item"><div class="tr-name">${def.label}</div><div class="tr-dots">${dots}</div><div class="tr-val ${lv}">${lv}</div></div>`;
    });
    // Animate dots
    tg.querySelectorAll('.dp.on').forEach((dp,i)=>{
      dp.style.background='transparent'; dp.style.boxShadow='none';
      setTimeout(()=>{ dp.style.background='var(--blue)'; dp.style.boxShadow='0 0 5px rgba(0,153,255,.6)'; }, i*55+100);
    });
  },250);
}

function shareResult(){
  const r=calc(); const data=TYPES[r.type]||TYPES['INTP'];
  const text=`我家${petName}的 petBTI 测评结果\n\n类型：${r.type}「${data.nickname}」\n置信度：${r.conf}%（精准命中 ${r.hit}/12 题）\n\n${data.roast}\n\n#petBTI #宠物人格测评`;
  if(navigator.share) navigator.share({title:'petBTI 宠物人格测评',text});
  else navigator.clipboard.writeText(text).then(()=>toast('已复制到剪贴板')).catch(()=>toast('长按选择文字复制'));
}
function restartQuiz(){ document.getElementById('pet-name-input').value=''; showScreen('welcome'); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
</script>
